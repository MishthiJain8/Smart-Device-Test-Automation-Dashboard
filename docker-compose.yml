version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: device_test_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Service
  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/device_test_db
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend-api:/app
      - /app/node_modules
    command: npm start

  # Device Simulator 1
  device-simulator-1:
    build:
      context: ./device-simulator
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DEVICE_ID: device-001
      PORT: 3001
      BACKEND_API_URL: http://backend-api:3000
    depends_on:
      - backend-api
    volumes:
      - ./device-simulator:/app
      - /app/node_modules

  # Device Simulator 2
  device-simulator-2:
    build:
      context: ./device-simulator
      dockerfile: Dockerfile
    ports:
      - "3002:3001"
    environment:
      DEVICE_ID: device-002
      PORT: 3001
      BACKEND_API_URL: http://backend-api:3000
    depends_on:
      - backend-api
    volumes:
      - ./device-simulator:/app
      - /app/node_modules

  # Device Simulator 3
  device-simulator-3:
    build:
      context: ./device-simulator
      dockerfile: Dockerfile
    ports:
      - "3003:3001"
    environment:
      DEVICE_ID: device-003
      PORT: 3001
      BACKEND_API_URL: http://backend-api:3000
    depends_on:
      - backend-api
    volumes:
      - ./device-simulator:/app
      - /app/node_modules

  # Device Simulator 4
  device-simulator-4:
    build:
      context: ./device-simulator
      dockerfile: Dockerfile
    ports:
      - "3004:3001"
    environment:
      DEVICE_ID: device-004
      PORT: 3001
      BACKEND_API_URL: http://backend-api:3000
    depends_on:
      - backend-api
    volumes:
      - ./device-simulator:/app
      - /app/node_modules

  # Device Simulator 5
  device-simulator-5:
    build:
      context: ./device-simulator
      dockerfile: Dockerfile
    ports:
      - "3005:3001"
    environment:
      DEVICE_ID: device-005
      PORT: 3001
      BACKEND_API_URL: http://backend-api:3000
    depends_on:
      - backend-api
    volumes:
      - ./device-simulator:/app
      - /app/node_modules

  # Test Runner Service (runs on demand)
  test-runner:
    build:
      context: ./test-runner
      dockerfile: Dockerfile
    environment:
      BACKEND_API_URL: http://backend-api:3000
      DEVICE_SIMULATOR_URLS: http://device-simulator-1:3001,http://device-simulator-2:3001,http://device-simulator-3:3001,http://device-simulator-4:3001,http://device-simulator-5:3001
    depends_on:
      - backend-api
      - device-simulator-1
      - device-simulator-2
      - device-simulator-3
      - device-simulator-4
      - device-simulator-5
    volumes:
      - ./test-runner:/app
      - /app/node_modules
    command: npm run run-tests

  # Frontend Dashboard
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend-dashboard/index.html:/usr/share/nginx/html/index.html
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend-api
    command: nginx -g 'daemon off;'

volumes:
  postgres_data:
